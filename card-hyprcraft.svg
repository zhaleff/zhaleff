<svg width="420" height="140" viewBox="0 0 420 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&amp;display=swap');
      .card-bg { fill: #fafafa; stroke: #ebebeb; stroke-width: 1; }
      .c-title { font-family: 'DM Sans', system-ui, sans-serif; font-size: 17px; font-weight: 500; fill: #111; }
      .c-desc  { font-family: 'DM Sans', system-ui, sans-serif; font-size: 13px; font-weight: 400; fill: #777; }
      .c-meta  { font-family: 'DM Sans', system-ui, sans-serif; font-size: 12px; font-weight: 400; fill: #aaa; }
      .c-star  { font-family: 'DM Sans', system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #333; }
      .c-lang  { font-family: 'DM Sans', system-ui, sans-serif; font-size: 12px; font-weight: 400; fill: #999; }
      .dot     { fill: #c6538c; }
      .divline { stroke: #ebebeb; stroke-width: 1; }
      @media (prefers-color-scheme: dark) {
        .card-bg { fill: #161616; stroke: #2a2a2a; }
        .c-title { fill: #f0f0f0; }
        .c-desc  { fill: #888; }
        .c-meta  { fill: #555; }
        .c-star  { fill: #ccc; }
        .c-lang  { fill: #666; }
        .divline { stroke: #2a2a2a; }
      }
    </style>
  </defs>
  <rect rx="10" width="420" height="140" class="card-bg"/>
  <text x="24" y="40" class="c-title">hyprcraft</text>
  <text x="24" y="62" class="c-desc">A beautiful development environment,</text>
  <text x="24" y="78" class="c-desc">built with care.</text>
  <line x1="24" y1="100" x2="396" y2="100" class="divline"/>
  <circle cx="32" cy="120" r="5" class="dot"/>
  <text x="44" y="124" class="c-lang">SCSS</text>
  <text x="210" y="124" class="c-star">★ 117</text>
  <text x="290" y="124" class="c-meta">4 forks</text>
</svg>

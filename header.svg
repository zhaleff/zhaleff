      }
      .accent {
        fill: #0f0f0f;
      }
      @media (prefers-color-scheme: dark) {
        .name { fill: #f0f0f0; }
        .role { fill: #777777; }
        .tag { fill: #444444; }
        .divider { stroke: #2a2a2a; }
        .accent { fill: #f0f0f0; }
      }
    </style>
  </defs>
  <rect width="860" height="200" fill="transparent"/>
  <rect x="0" y="110" width="3" height="60" class="accent"/>
  <text x="20" y="96" class="name">zhaleff</text>
  <text x="21" y="128" class="role">Frontend Engineer · React · Next.js · TypeScript</text>
  <line x1="0" y1="160" x2="860" y2="160" class="divider"/>
  <text x="21" y="184" class="tag">Building interfaces worth the user's attention · zhaleff.web.app</text>

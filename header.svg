<svg width="860" height="200" viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&amp;display=swap');
      .name {
        font-family: 'DM Sans', system-ui, sans-serif;
        font-size: 72px;
        font-weight: 300;
        letter-spacing: -3px;
        fill: #0f0f0f;
      }
      .role {
        font-family: 'DM Sans', system-ui, sans-serif;
        font-size: 15px;
        font-weight: 400;
        letter-spacing: 0.08em;
        fill: #888888;
      }
      .tag {
        font-family: 'DM Sans', system-ui, sans-serif;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        fill: #cccccc;
      }
      .divider {
        stroke: #e8e8e8;

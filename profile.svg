<svg width="860" height="380" viewBox="0 0 860 380" xmlns="http://www.w3.org/2000/svg">

  <!-- Background: GitHub dark sidebar gray -->
  <rect width="860" height="380" fill="#f6f8fa"/>

  <!-- Top copper accent -->
  <rect x="0" y="0" width="860" height="3" fill="#c9856a"/>

  <!-- LEFT COLUMN -->

  <!-- Name -->
  <text x="48" y="98"
    font-family="Georgia,'Times New Roman',serif"
    font-size="68" font-weight="bold"
    fill="#1c1917" letter-spacing="-2">Zhaleff</text>

  <!-- Copper underline -->
  <rect x="48" y="112" width="52" height="2.5" fill="#c9856a"/>

  <!-- Role chip -->
  <rect x="48" y="128" width="236" height="26" rx="13" fill="#e8ddd5"/>
  <text x="64" y="146"
    font-family="Helvetica,Arial,sans-serif"
    font-size="11" font-weight="bold"
    fill="#7a4a35" letter-spacing="1.6">OSINT · WEB · LINUX</text>

  <!-- Bio -->
  <text x="48" y="192"
    font-family="Helvetica,Arial,sans-serif"
    font-size="14" fill="#57534e">Self-taught developer. One year in,</text>
  <text x="48" y="212"
    font-family="Helvetica,Arial,sans-serif"
    font-size="14" fill="#57534e">still questioning — but that's the point.</text>

  <!-- Thin divider -->
  <line x1="48" y1="238" x2="400" y2="238" stroke="#e2d5ce" stroke-width="1"/>

  <!-- Focus areas -->
  <rect x="48" y="252" width="70" height="20" rx="10" fill="#e8ddd5"/>
  <text x="60" y="267"
    font-family="Helvetica,Arial,sans-serif"
    font-size="10" font-weight="bold"
    fill="#c9856a" letter-spacing="1.4">BUILDING</text>

  <text x="48" y="298"
    font-family="Helvetica,Arial,sans-serif"
    font-size="14" fill="#1c1917">React · Next.js · TypeScript</text>
  <text x="48" y="318"
    font-family="Helvetica,Arial,sans-serif"
    font-size="13" fill="#78716c">Tailwind · Framer Motion · CSS</text>

  <line x1="48" y1="340" x2="400" y2="340" stroke="#e2d5ce" stroke-width="1"/>

  <rect x="48" y="352" width="80" height="20" rx="10" fill="#e8ddd5"/>
  <text x="60" y="367"
    font-family="Helvetica,Arial,sans-serif"
    font-size="10" font-weight="bold"
    fill="#c9856a" letter-spacing="1.4">EXPLORING</text>

  <!-- RIGHT COLUMN — white surface card -->
  <rect x="460" y="24" width="372" height="332" rx="20"
    fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Copper left bar on card -->
  <rect x="460" y="24" width="4" height="332" rx="2" fill="#c9856a"/>

  <!-- Quote mark -->
  <text x="488" y="90"
    font-family="Georgia,'Times New Roman',serif"
    font-size="52" fill="#f0e6e0">"</text>

  <text x="488" y="120"
    font-family="Georgia,'Times New Roman',serif"
    font-size="14" font-style="italic" fill="#78716c">I started from the bottom and began</text>
  <text x="488" y="140"
    font-family="Georgia,'Times New Roman',serif"
    font-size="14" font-style="italic" fill="#78716c">digging, because diamonds are always</text>
  <text x="488" y="160"
    font-family="Georgia,'Times New Roman',serif"
    font-size="14" font-style="italic" fill="#78716c">underground.</text>

  <line x1="488" y1="184" x2="812" y2="184" stroke="#f0e8e4" stroke-width="1"/>

  <!-- About label -->
  <rect x="488" y="198" width="56" height="20" rx="10" fill="#f0e8e4"/>
  <text x="500" y="213"
    font-family="Helvetica,Arial,sans-serif"
    font-size="10" font-weight="bold"
    fill="#c9856a" letter-spacing="1.4">ABOUT</text>

  <text x="488" y="248"
    font-family="Helvetica,Arial,sans-serif"
    font-size="13" fill="#57534e">Student and self-taught developer who</text>
  <text x="488" y="266"
    font-family="Helvetica,Arial,sans-serif"
    font-size="13" fill="#57534e">enjoys creating through code, Linux</text>
  <text x="488" y="284"
    font-family="Helvetica,Arial,sans-serif"
    font-size="13" fill="#57534e">customization, and design.</text>

  <line x1="488" y1="304" x2="812" y2="304" stroke="#f0e8e4" stroke-width="1"/>

  <!-- Contact chips -->
  <rect x="488" y="318" width="100" height="22" rx="11" fill="#f6f8fa" stroke="#e2e8f0" stroke-width="1"/>
  <text x="502" y="334"
    font-family="Helvetica,Arial,sans-serif"
    font-size="11" fill="#57534e">gh · @zhaleff</text>

  <rect x="600" y="318" width="116" height="22" rx="11" fill="#f6f8fa" stroke="#e2e8f0" stroke-width="1"/>
  <text x="614" y="334"
    font-family="Helvetica,Arial,sans-serif"
    font-size="11" fill="#57534e">tw · @zephartw</text>

  <!-- Bottom copper accent -->
  <rect x="0" y="377" width="860" height="3" fill="#c9856a"/>

</svg>

<rect x="48" y="136" width="40" height="2" class="ac"/>

<text x="48" y="168" class="sub">OSINT · Web Development · Linux Customization</text>

<text x="48" y="202" class="body">Self-taught developer. One year in, still questioning —</text>
<text x="48" y="220" class="body">but that's the point.</text>


.body-em  { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 500; fill: #a08070; }
.ct       { font-family: Georgia, 'Times New Roman', serif; font-size: 17px; font-weight: bold; fill: #e8ddd5; }
.ct-sm    { font-family: Georgia, 'Times New Roman', serif; font-size: 14px; font-style: italic; fill: #c4b5aa; }
.star     { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; fill: #c9856a; }
.muted    { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #3d2e28; }

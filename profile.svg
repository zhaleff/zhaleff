<svg width="860" height="580" viewBox="0 0 860 580" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&amp;family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&amp;display=swap');
.bg-main  { fill: #0c0a09; }
.bg-card  { fill: #1a1210; }
.bg-card2 { fill: #150f0d; }
.ac       { fill: #c9856a; }
.ac-str   { stroke: #c9856a; stroke-width: 1; fill: none; }
.ac-str-t { stroke: #2a1f1a; stroke-width: 0.75; fill: none; }
.title    { font-family: 'Playfair Display', Georgia, serif; font-size: 72px; font-weight: 800; fill: #f0ebe6; letter-spacing: -2px; }
.sub      { font-family: 'DM Sans', system-ui, sans-serif; font-size: 14px; font-weight: 300; fill: #7a6560; letter-spacing: 0.04em; }
.label    { font-family: 'DM Sans', system-ui, sans-serif; font-size: 10px; font-weight: 500; fill: #c9856a; letter-spacing: 0.18em; }
.body     { font-family: 'DM Sans', system-ui, sans-serif; font-size: 14px; font-weight: 300; fill: #8a7570; }
.body-em  { font-family: 'DM Sans', system-ui, sans-serif; font-size: 14px; font-weight: 400; fill: #b09080; }
.ct       { font-family: 'Playfair Display', Georgia, serif; font-size: 18px; font-weight: 700; fill: #e8e0d8; }
.ct-sm    { font-family: 'Playfair Display', Georgia, serif; font-size: 15px; font-weight: 700; fill: #d4c8be; }
.star     { font-family: 'DM Sans', system-ui, sans-serif; font-size: 12px; font-weight: 500; fill: #c9856a; }
.muted    { font-family: 'DM Sans', system-ui, sans-serif; font-size: 11px; font-weight: 400; fill: #4a3830; }
.dot-js   { fill: #c9856a; }
.dot-sh   { fill: #7a9e6a; }
.dot-sc   { fill: #9a6aab; }
</style>
</defs>

<rect width="860" height="580" class="bg-main"/>

<rect x="0" y"0" width="860" height="2" class="ac"/>



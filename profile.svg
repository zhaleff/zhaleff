<svg width="860" height="440" viewBox="0 0 860 440" xmlns="http://www.w3.org/2000/svg">
<style>
  @keyframes fadeUp {
    0%   { opacity: 0; transform: translateY(12px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    0%   { opacity: 0; }
    100% { opacity: 1; }
  }
  @keyframes slideRight {
    0%   { width: 0; }
    100% { width: 48px; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  .g-name   { animation: fadeUp 0.7s cubic-bezier(.4,0,.2,1) 0.1s both; }
  .g-chip   { animation: fadeUp 0.7s cubic-bezier(.4,0,.2,1) 0.3s both; }
  .g-bio    { animation: fadeUp 0.7s cubic-bezier(.4,0,.2,1) 0.5s both; }
  .g-left   { animation: fadeUp 0.7s cubic-bezier(.4,0,.2,1) 0.6s both; }
  .g-right  { animation: fadeUp 0.7s cubic-bezier(.4,0,.2,1) 0.7s both; }
  .g-bottom { animation: fadeUp 0.7s cubic-bezier(.4,0,.2,1) 0.9s both; }
  .g-dot    { animation: pulse 2.4s ease-in-out 1.2s infinite; }
  .g-accent { animation: fadeIn 0.5s ease 0.05s both; }
</style>

<!-- Background matches GitHub light: #f6f8fa -->
<rect width="860" height="440" fill="#f6f8fa"/>

<!-- Top accent bar — copper, full width -->
<rect class="g-accent" x="0" y="0" width="860" height="3" rx="0" fill="#c9856a"/>

<!-- ── HERO LEFT ─────────────────────────────────────────────────── -->

<!-- Name -->
<text class="g-name"
  x="48" y="100"
  font-family="Georgia,'Times New Roman',serif"
  font-size="64" font-weight="bold"
  fill="#1f1108" letter-spacing="-1.5">Zhaleff</text>

<!-- Copper underline -->
<rect class="g-accent" x="48" y="112" width="48" height="2.5" rx="1.25" fill="#c9856a"/>

<!-- Role pill chip — M3 style -->
<g class="g-chip">
  <rect x="48" y="128" width="222" height="26" rx="13" fill="#e8ddd5"/>
  <text x="64" y="146"
    font-family="Helvetica,Arial,sans-serif"
    font-size="11" font-weight="bold"
    fill="#7a4a35" letter-spacing="1.8">OSINT · WEB · LINUX</text>
</g>

<!-- Bio -->
<g class="g-bio">
  <text x="48" y="186"
    font-family="Helvetica,Arial,sans-serif"
    font-size="14" fill="#57534e">Self-taught developer. One year in,</text>
  <text x="48" y="206"
    font-family="Helvetica,Arial,sans-serif"
    font-size="14" fill="#57534e">still questioning — but that's the point.</text>
</g>

<!-- ── LEFT SURFACE CARD ─────────────────────────────────────────── -->
<g class="g-left">
  <!-- M3 surface container -->
  <rect x="48" y="240" width="360" height="168" rx="20" fill="#ffffff"
        stroke="#e2e8f0" stroke-width="1"/>

  <!-- Section label chip -->
  <rect x="72" y="262" width="74" height="20" rx="10" fill="#f0e8e4"/>
  <text x="84" y="277"
    font-family="Helvetica,Arial,sans-serif"
    font-size="10" font-weight="bold"
    fill="#c9856a" letter-spacing="1.5">BUILDING</text>

  <text x="72" y="308"
    font-family="Helvetica,Arial,sans-serif"
    font-size="14" fill="#1c1917">React · Next.js · TypeScript</text>
  <text x="72" y="328"
    font-family="Helvetica,Arial,sans-serif"
    font-size="13" fill="#78716c">Tailwind · Framer Motion</text>

  <!-- Tonal divider -->
  <line x1="72" y1="348" x2="388" y2="348" stroke="#f0e8e4" stroke-width="1"/>

  <rect x="72" y="360" width="82" height="20" rx="10" fill="#f0e8e4"/>
  <text x="84" y="375"
    font-family="Helvetica,Arial,sans-serif"
    font-size="10" font-weight="bold"
    fill="#c9856a" letter-spacing="1.5">EXPLORING</text>

  <text x="72" y="396"
    font-family="Helvetica,Arial,sans-serif"
    font-size="13" fill="#78716c">OSINT · Cybersecurity · Pattern recognition</text>
</g>

<!-- ── RIGHT SURFACE CARD ─────────────────────────────────────────── -->
<g class="g-right">
  <rect x="432" y="240" width="396" height="168" rx="20" fill="#ffffff"
        stroke="#e2e8f0" stroke-width="1"/>

  <!-- Copper left bar inside card -->
  <rect x="432" y="240" width="4" height="168" rx="2" fill="#c9856a"/>

  <!-- Quote mark decorative -->
  <text x="460" y="296"
    font-family="Georgia,'Times New Roman',serif"
    font-size="48" fill="#e8ddd5">"</text>

  <text x="460" y="314"
    font-family="Georgia,'Times New Roman',serif"
    font-size="13" font-style="italic" fill="#78716c">I started from the bottom and began</text>
  <text x="460" y="332"
    font-family="Georgia,'Times New Roman',serif"
    font-size="13" font-style="italic" fill="#78716c">digging, because diamonds are always</text>
  <text x="460" y="350"
    font-family="Georgia,'Times New Roman',serif"
    font-size="13" font-style="italic" fill="#78716c">underground.</text>

  <line x1="460" y1="370" x2="808" y2="370" stroke="#f0e8e4" stroke-width="1"/>

  <!-- Live dot -->
  <circle class="g-dot" cx="470" cy="395" r="4" fill="#c9856a"/>
  <text x="482" y="400"
    font-family="Helvetica,Arial,sans-serif"
    font-size="12" fill="#a8a29e">open to interesting conversations</text>
</g>

<!-- ── BOTTOM CONTACT STRIP ───────────────────────────────────────── -->
<g class="g-bottom">
  <rect x="48" y="428" width="764" height="1" fill="#e8ddd5"/>

  <text x="48" y="442" <!-- This won't show, outside viewBox, intentional for spacing -->
    font-family="Helvetica,Arial,sans-serif"
    font-size="11" fill="#a8a29e"/>
</g>

<!-- Contact row — inside viewbox -->
<g class="g-bottom">
  <!-- Three contact chips at bottom -->
  <rect x="48" y="416" width="106" height="22" rx="11" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="62" y="432"
    font-family="Helvetica,Arial,sans-serif"
    font-size="11" fill="#57534e">gh · @zhaleff</text>

  <rect x="166" y="416" width="118" height="22" rx="11" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="180" y="432"
    font-family="Helvetica,Arial,sans-serif"
    font-size="11" fill="#57534e">tw · @zephartw</text>

  <rect x="296" y="416" width="196" height="22" rx="11" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="310" y="432"
    font-family="Helvetica,Arial,sans-serif"
    font-size="11" fill="#57534e">zhaleff.core@gmail.com</text>
</g>

</svg>

.ac-t     { stroke: #2a1f1a; stroke-width: 0.75; fill: none; }
.title    { font-family: Georgia, 'Times New Roman', serif; font-size: 72px; font-weight: bold; fill: #f0ebe6; letter-spacing: -2px; }
